name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release-apk:
    name: Signed release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/release.keystore

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_HFAC_SERVER_URL: ${{ vars.HFAC_SERVER_URL }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk "hfac-${GITHUB_REF_NAME}.apk"
          # Stable filename so /releases/latest/download/hfac.apk always
          # resolves to the newest build (used by the server's join page).
          cp app/build/outputs/apk/release/app-release.apk "hfac.apk"

      - name: Create GitHub release with APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "hfac-${GITHUB_REF_NAME}.apk" "hfac.apk" \
            --title "HFAC $GITHUB_REF_NAME" \
            --generate-notes
